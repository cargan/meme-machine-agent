name: Daily Meme Generator

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:   # Prideda mygtuką "Run workflow" rankiniam testavimui

jobs:
  build:
    runs-on: ubuntu-latest

    # Leidžiame robotui rašyti į mūsų folderį (reikia Commit'ams)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests dotenv

      - name: Run Meme Machine
        env:
          IMGFLIP_USERNAME: ${{ secrets.IMGFLIP_USERNAME }}
          IMGFLIP_PASSWORD: ${{ secrets.IMGFLIP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python meme.py --auto

      - name: Commit and Push new meme
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add memes/
          # Tikriname, ar yra ką commitinti, kad nemestų klaidos
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Daily Meme Update: $(date +'%Y-%m-%d')" && git push)
